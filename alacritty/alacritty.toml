general.import = ["./cyberdream.toml"]
[window]
dimensions = { columns = 120, lines = 40}
title = "Terminal"
opacity = 0.9
decorations_theme_variant = "Light"

[font]
normal = { family = "Maple Mono NF CN", style = "Regular" }
offset = { x = 1, y = 0 }
size = 11.5

[cursor]
style = { shape = "Beam", blinking = "Always" }
# Set to false to disable completely
smooth_motion = true
# 0.0 = cursor is not moving, 1.0 = cursor moves instantly
smooth_motion_factor = 0.6
# 0.0 = broken, 1.0 = cursor shape is unaffected by movement
smooth_motion_spring = 0.7
# Limits how the cursor size may change
smooth_motion_max_stretch_x = 1.5
smooth_motion_max_stretch_y = 1.5
# Override "block" cursor if you don't like how it looks in this fork
# block_replace_shape = "underline"

[terminal]
shell = { program = "nu", args = [] }

[[mouse.bindings]]
mouse = "Right"
action = "Paste"
